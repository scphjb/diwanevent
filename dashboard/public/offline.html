<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ديوان إيفنت — غير متصل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: #050B18;
      color: #F3F4F6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(42,100,236,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(212,175,55,0.05) 0%, transparent 60%);
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 48px 36px;
      max-width: 380px;
      width: 100%;
      backdrop-filter: blur(20px);
    }
    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #D4AF37, #F0C040);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 900; color: #050B18;
      margin: 0 auto 1.5rem;
      box-shadow: 0 16px 48px rgba(212,175,55,0.25);
    }
    .signal {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      display: block;
      opacity: 0.5;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
    h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.6rem; color: #fff; }
    p { color: rgba(243,244,246,0.5); font-size: 0.95rem; line-height: 1.7; max-width: 280px; margin: 0 auto 2rem; }
    .btn {
      background: linear-gradient(135deg, #2A64EC, #38BDF8);
      color: white; border: none;
      padding: 0.875rem 2.5rem;
      border-radius: 14px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(42,100,236,0.3);
      width: 100%;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(42,100,236,0.4); }
    .btn:active { transform: scale(0.98); }
    .btn-clear {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      margin-top: 0.75rem;
      box-shadow: none;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.05); box-shadow: none; }
    .status-bar {
      margin-top: 1.5rem;
      padding: 0.625rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      transition: all 0.4s;
    }
    .status-offline {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: rgba(252,165,165,0.7);
    }
    .status-online {
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.3);
      color: #38BDF8;
    }
    .status-checking {
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.2);
      color: rgba(212,175,55,0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="signal">📡</span>
    <div class="logo">D</div>
    <h1>لا يوجد اتصال</h1>
    <p>تعذّر الاتصال بالخادم. تحقق من اتصالك بالإنترنت وحاول مجدداً.</p>

    <button class="btn" onclick="tryReconnect()">🔄 إعادة المحاولة</button>
    <button class="btn btn-clear" onclick="clearCacheAndReload()">🗑 مسح الكاش وإعادة التحميل</button>

    <div class="status-bar status-checking" id="status">جاري فحص الاتصال...</div>
  </div>

  <script>
    let checkTimer = null;

    // فحص حقيقي عبر /api/v1/health بدلاً من google.com (لتجنب CORS)
    async function checkConnection() {
      const el = document.getElementById('status');
      el.className = 'status-bar status-checking';
      el.textContent = 'جاري فحص الاتصال...';
      try {
        const res = await fetch('/api/v1/health', {
          method: 'GET',
          cache: 'no-store',
          signal: AbortSignal.timeout(5000)
        });
        if (res.ok || res.status === 401) {
          // 401 = الخادم يعمل لكن يطلب مصادقة — يعني الاتصال موجود
          el.className = 'status-bar status-online';
          el.textContent = '✅ الاتصال موجود — جاري إعادة التوجيه...';
          setTimeout(() => window.location.href = '/', 1200);
          return true;
        }
      } catch (_) { /* offline */ }
      el.className = 'status-bar status-offline';
      el.textContent = '❌ لا يوجد اتصال بالخادم';
      return false;
    }

    async function tryReconnect() {
      await checkConnection();
    }

    // مسح الكاش وإعادة التحميل الكامل
    async function clearCacheAndReload() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) await reg.unregister();
        }
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      } catch (_) {}
      window.location.href = '/';
    }

    // مراقبة حالة الشبكة
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', () => {
      const el = document.getElementById('status');
      el.className = 'status-bar status-offline';
      el.textContent = '❌ انقطع الاتصال';
    });

    // فحص فوري عند تحميل الصفحة
    checkConnection();
    // فحص كل 8 ثوانٍ
    checkTimer = setInterval(checkConnection, 8000);
  </script>
</body>
</html>
