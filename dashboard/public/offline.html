<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ديوان إيفنت — غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: #050B18;
      color: #F3F4F6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #D4AF37, #F0C040);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: #050B18;
      margin: 0 auto 2rem;
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      color: rgba(243,244,246,0.6);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 2rem;
    }
    .signal-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.4;
    }
    button {
      background: linear-gradient(135deg, #2A64EC, #38BDF8);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:hover { transform: scale(1.02); opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .status {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(243,244,246,0.3);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="signal-icon">📡</div>
  <div class="icon">D</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك وحاول مجدداً.</p>
  <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>
  <div class="status" id="status">جاري فحص الاتصال...</div>

  <script>
    function updateStatus() {
      const el = document.getElementById('status');
      if (navigator.onLine) {
        el.textContent = '✅ تم استعادة الاتصال — يمكنك الضغط على إعادة المحاولة';
        el.style.color = 'rgba(56,189,248,0.8)';
      } else {
        el.textContent = 'غير متصل بالإنترنت';
        el.style.color = 'rgba(243,244,246,0.3)';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
