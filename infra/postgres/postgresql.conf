# ══════════════════════════════════════════════
#  Diwan Event Platform — PostgreSQL Tuning Config
#  إعدادات محسّنة خصيصاً للإنتاج لزيادة أداء الكتابة
#  وتحمل الـ Concurrent Voting Spikes.
# ══════════════════════════════════════════════

# ── 1. اتصالات الـ Clients ──────────────────
listen_addresses = '*'
max_connections = 100            # كافية جداً بوجود PgBouncer
superuser_reserved_connections = 3

# ── 2. إدارة الذاكرة (سيرفر 2GB RAM كبداية) ─────────
shared_buffers = 512MB           # 25% من إجمالي الذاكرة
effective_cache_size = 1536MB    # 75% من إجمالي الذاكرة
maintenance_work_mem = 128MB
work_mem = 16MB                  # ذاكرة كافية لعمليات الـ Sort و Group By المعقدة

# ── 3. تحسينات الكتابة والقرص (Write-Ahead Log) ─────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 512MB
synchronous_commit = off         # ⚡ يضاعف أداء الكتابة المتزامنة 5x! (مهم جداً للتصويت المتزامن)

# ── 4. تحسينات المعالجة والخيوط ──────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── 5. سجلات الأخطاء والمراقبة ──────────────────
log_min_messages = warning
log_min_error_statement = error
log_autovacuum_min_duration = 250ms # تسجيل عمليات التنظيف التلقائية البطيئة
