user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048; # زيادة عدد الاتصالات المتزامنة لكل عامل
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # تحسين إرسال الملفات والأداء
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off; # إخفاء إصدار Nginx لأسباب أمنية

    # الحد الأقصى لحجم رفع الملفات (مهم عند رفع شعارات أو ملفات إكسل للمشاركين)
    client_max_body_size 20M;

    # ── تحدد سعة الطلبات ومعدل الحماية ───────────────────────
    # قمنا بزيادة المعدل لتناسب الطفرات المتزامنة الحقيقية
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s; 

    # ── ضغط الاستجابات (Gzip) ──────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── تحويل HTTP ← HTTPS ────────────────────────────────
    server {
        listen 80;
        server_name event.e-diwan.net *.e-diwan.net;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # ── HTTPS Configuration ────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name event.e-diwan.net *.e-diwan.net;
        
        # مسارات شهادات SSL المدارة عبر Certbot
        ssl_certificate /etc/letsencrypt/live/event.e-diwan.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/event.e-diwan.net/privkey.pem;
        
        # إعدادات أمان SSL متقدمة
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # HSTS (Strict Transport Security) لحماية النطاق
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        
        # رؤوس الأمان الأساسية
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # ── واجهة المستخدم (Frontend - React) ────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 7d; # تمديد صلاحية الكاش للملفات الثابتة
            add_header Cache-Control "public, no-transform";
        }
        
        # ── الملفات الثابتة والصور المرفوعة ──────────────────────
        location /static/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── مسارات الـ API (FastAPI backend) ─────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay; # رفع الـ Burst لتفادي حظر المصوتين وقت الطفرة
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # مهلة معالجة الاتصالات الطويلة (التقارير وشهادات PDF)
            proxy_read_timeout 180s;
            proxy_connect_timeout 60s;
        }
        
        # ── بث النتائج المباشر (WebSockets) ────────────────────
        location /ws/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # مهلة ساعة للحفاظ على قنوات البث نشطة
            proxy_read_timeout 3600s;
        }
    }
}
