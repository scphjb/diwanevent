name: Diwan Event CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r attendance_system/requirements.txt

    - name: Check syntax (py compile)
      run: |
        python -m compileall attendance_system/app -q

  build-and-deploy:
    name: Build Docker Image
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        cd attendance_system
        docker build -f Dockerfile -t diwan-event:latest .

    - name: Deploy Placeholder
      run: echo "✅ Build successful — ready to deploy to Cloud"
