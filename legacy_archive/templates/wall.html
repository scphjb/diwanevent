<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجدار الاجتماعي | {{ settings.event_name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: {{ settings.primary_color or '#D4AF37' }};
            --secondary: {{ settings.secondary_color or '#022C22' }};
            --bg: #011612;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Screen Mode (?mode=screen) */
        body.screen-mode {
            background: radial-gradient(circle at center, var(--secondary), #000);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        
        .screen-header {
            padding: 2rem; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.3); border-bottom: 2px solid var(--primary);
        }
        .screen-header h1 { font-size: 2.5rem; color: var(--primary); }
        .screen-header img { height: 80px; }

        .wall-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 2rem;
            flex-grow: 1; overflow: hidden;
        }

        .post-card {
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 2rem; padding: 2rem; position: relative;
            animation: slideInUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; gap: 1rem;
        }
        
        @keyframes slideInUp { from { opacity: 0; transform: translateY(100px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .post-author { font-weight: 900; color: var(--primary); font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .post-content { font-size: 1.4rem; line-height: 1.6; }
        .post-emoji { font-size: 3rem; align-self: flex-end; }
        .post-meta { font-size: 0.9rem; opacity: 0.5; margin-top: auto; display: flex; justify-content: space-between; }

        .screen-mode .post-card { height: fit-content; }
        .screen-mode .post-content { font-size: 1.8rem; }

        /* Mobile Mode (Default) */
        .mobile-container { max-width: 600px; margin: 0 auto; padding: 1.5rem; padding-bottom: 100px; }
        .mobile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .mobile-header h2 { color: var(--primary); }

        .mobile-post { margin-bottom: 1.5rem; }
        .mobile-post .post-content { font-size: 1.1rem; }
        .mobile-post .post-emoji { font-size: 1.5rem; }

        .post-actions { display: flex; gap: 1rem; margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 0.8rem; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; opacity: 0.7; transition: 0.3s; }
        .action-btn:hover, .action-btn.active { opacity: 1; color: var(--primary); }
        .action-btn i { font-size: 1.2rem; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: var(--secondary);
            padding: 1rem 2.5rem; border-radius: 3rem; font-weight: 900;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); border: none; cursor: pointer;
            z-index: 100; display: flex; align-items: center; gap: 10px; font-size: 1.1rem;
        }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1.5rem;
        }
        .modal-content {
            background: var(--bg); border: 1px solid var(--glass-border);
            width: 100%; max-width: 500px; padding: 2rem; border-radius: 2rem;
        }
        .modal-content h3 { color: var(--primary); margin-bottom: 1.5rem; }
        
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; opacity: 0.7; font-size: 0.9rem; }
        .input-group input, .input-group textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 1rem; padding: 1rem; color: white; font-size: 1rem; outline: none;
        }
        .emoji-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }
        .emoji-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; transition: 0.3s;
        }
        .emoji-btn.active { border-color: var(--primary); background: rgba(212,175,55,0.2); transform: scale(1.2); }

        .btn-submit {
            width: 100%; padding: 1rem; border-radius: 1rem; border: none;
            background: var(--primary); color: var(--secondary); font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-top: 1rem;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pinned-tag {
            position: absolute; top: 1rem; left: 1rem;
            background: var(--primary); color: var(--secondary);
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold;
        }
    </style>
</head>
<body class="{{ 'screen-mode' if mode == 'screen' else '' }}">

    {% if mode == 'screen' %}
    <!-- SCREEN MODE -->
    <div class="screen-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="{{ settings.logo_url or '/static/img/logo.png' }}" alt="Logo">
            <div>
                <h1>نبض الملتقى</h1>
                <p style="opacity:0.6;">شاركنا انطباعك عبر مسح كود البادج والدخول للبوابة</p>
            </div>
        </div>
        <div id="live-indicator" style="display: flex; align-items: center; gap: 10px; color: #ef4444; font-weight: bold;">
            <span style="width: 12px; height: 12px; background: #ef4444; border-radius: 50%; animation: pulse 1s infinite;"></span>
            مباشر (WebSocket)
        </div>
    </div>
    
    <div class="wall-grid" id="wall-grid">
        <!-- Posts will be injected here -->
    </div>

    {% else %}
    <!-- MOBILE MODE -->
    <div class="mobile-container">
        <div class="mobile-header">
            <a href="/portal" style="color: white; text-decoration: none;"><i class="fas fa-chevron-right"></i></a>
            <h2 data-i18n="نبض الملتقى">نبض الملتقى</h2>
            <div style="width: 24px;"></div>
        </div>

        <div id="wall-feed">
            <!-- Posts injected here -->
            <div class="loader" id="feed-loader" style="text-align: center; padding: 3rem; opacity: 0.5;">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            </div>
        </div>
        
        <button class="fab" onclick="openPostModal()">
            <i class="fas fa-pen-fancy"></i>
            <span data-i18n="شارك انطباعك">شارك انطباعك</span>
        </button>
    </div>

    <!-- Post Modal -->
    <div class="modal" id="post-modal">
        <div class="modal-content">
            <h3 data-i18n="انطباع جديد">انطباع جديد</h3>
            <div class="input-group">
                <label data-i18n="الاسم (اختياري)">الاسم (اختياري)</label>
                <input type="text" id="post-author" data-i18n-placeholder="اترك الاسم فارغاً للنشر كمجهول" placeholder="اترك الاسم فارغاً للنشر كمجهول">
            </div>
            <div class="input-group">
                <label data-i18n="ماذا يخطر في بالك؟ (280 حرف)">ماذا يخطر في بالك؟ (280 حرف)</label>
                <textarea id="post-content" maxlength="280" data-i18n-placeholder="عبر عن انطباعك بكلمات..." placeholder="عبر عن انطباعك بكلمات..."></textarea>
            </div>
            <label style="opacity: 0.7; font-size: 0.9rem;" data-i18n="اختر تفاعلاً">اختر تفاعلاً</label>
            <div class="emoji-selector">
                <div class="emoji-btn active" onclick="selectEmoji('👏', this)">👏</div>
                <div class="emoji-btn" onclick="selectEmoji('🎉', this)">🎉</div>
                <div class="emoji-btn" onclick="selectEmoji('💡', this)">💡</div>
                <div class="emoji-btn" onclick="selectEmoji('🔥', this)">🔥</div>
                <div class="emoji-btn" onclick="selectEmoji('❤️', this)">❤️</div>
                <div class="emoji-btn" onclick="selectEmoji('🌟', this)">🌟</div>
                <div class="emoji-btn" onclick="selectEmoji('👍', this)">👍</div>
                <div class="emoji-btn" onclick="selectEmoji('🙌', this)">🙌</div>
                <div class="emoji-btn" onclick="selectEmoji('💪', this)">💪</div>
                <div class="emoji-btn" onclick="selectEmoji('🎯', this)">🎯</div>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn-submit" style="background: var(--glass); color: white;" onclick="closePostModal()" data-i18n="إلغاء">إلغاء</button>
                <button class="btn-submit" onclick="submitPost()" data-i18n="نشر الآن">نشر الآن</button>
            </div>
        </div>
    </div>
    {% endif %}

    <script>
        const isScreen = {{ 'true' if mode == 'screen' else 'false' }};
        const eventId = {{ settings.id }};
        let selectedEmoji = '👏';
        let posts = [];

        function esc(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadPosts() {
            try {
                const res = await fetch(`/api/wall/posts?event_id=${eventId}`);
                const data = await res.json();
                posts = data.posts;
                renderPosts();
            } catch(e) { console.error("Failed to load posts", e); }
        }

        function renderPosts() {
            const container = isScreen ? document.getElementById('wall-grid') : document.getElementById('wall-feed');
            if(!container) return;
            
            if(!isScreen) container.innerHTML = '';
            else if(posts.length > 0) container.innerHTML = ''; // Full re-render for screen grid

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = isScreen ? 'post-card' : 'post-card mobile-post';
                if(p.is_pinned) {
                    const pin = document.createElement('span');
                    pin.className = 'pinned-tag';
                    pin.innerHTML = '<i class="fas fa-thumbtack"></i> مثبت';
                    card.appendChild(pin);
                }
                
                card.innerHTML += `
                    <div class="post-author">
                        <i class="fas fa-user-circle"></i>
                        <span>${esc(p.author_name || 'مشارك مجهول')}</span>
                    </div>
                    <div class="post-content">${esc(p.content)}</div>
                    <div class="post-emoji">${esc(p.emoji)}</div>
                    <div class="post-meta">
                        <span>${esc(new Date(p.created_at).toLocaleTimeString('ar-DZ', {hour:'2-digit', minute:'2-digit'}))}</span>
                        ${!isScreen ? `
                            <div class="post-actions">
                                <button class="action-btn" onclick="likePost(${p.id}, this)">
                                    <i class="fas fa-heart"></i>
                                    <span class="like-count">${esc(p.likes_count)}</span>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Post Submission ---
        function openPostModal() { document.getElementById('post-modal').style.display = 'flex'; }
        function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }
        function selectEmoji(e, btn) {
            selectedEmoji = e;
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function submitPost() {
            const author = document.getElementById('post-author').value.trim();
            const content = document.getElementById('post-content').value.trim();
            if(!content) return alert("يرجى كتابة محتوى المنشور");

            try {
                const res = await fetch('/api/wall/post', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        event_id: eventId,
                        author_name: author,
                        content: content,
                        emoji: selectedEmoji
                    })
                });
                if(res.ok) {
                    closePostModal();
                    document.getElementById('post-content').value = '';
                    loadPosts();
                }
            } catch(e) { alert("فشل النشر"); }
        }

        async function likePost(postId, btn) {
            try {
                const res = await fetch(`/api/wall/${postId}/like`, { method: 'POST' });
                const data = await res.json();
                btn.querySelector('.like-count').textContent = data.count;
                if(data.liked) btn.classList.add('active');
                else btn.classList.remove('active');
            } catch(e) {}
        }

        // --- WebSocket Real-time ---
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws/dashboard`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'wall_new_post') {
                // Add to start of posts array
                posts.unshift(data.post);
                if(posts.length > (isScreen ? 9 : 50)) posts.pop();
                renderPosts();
            }
        };

        window.onload = loadPosts;
        if(isScreen) setInterval(loadPosts, 30000); // Backup sync
    </script>
    
    <style>
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
    <script src="/static/js/app_i18n.js"></script>
    <script>
        // Use a different storage key for public pages if needed, or share the same one
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('diwan_admin_lang') || 'ar';
            if(savedLang !== 'ar' && typeof translatePage === 'function') {
                translatePage();
            }
        });
    </script>
</body>
</html>
