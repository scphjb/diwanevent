<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام الحضور 2026{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --emerald-black: #021a16;
            --emerald-dark: #053b32;
            --emerald: #0d4d42;
            --gold: #d4af37;
            --gold-light: #f4cf6d;
            --glass-bg: rgba(2, 26, 22, 0.85);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-dim: #e0e0e0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, var(--emerald-dark), var(--emerald-black));
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        nav {
            background: rgba(2, 26, 22, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-family: 'Amiri', serif;
            font-weight: bold;
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold-light);
            background: rgba(212, 175, 55, 0.1);
        }

        .btn-logout {
            color: #ff5252 !important;
            font-size: 0.85rem !important;
        }

        .btn-logout:hover {
            background: rgba(255, 82, 82, 0.1) !important;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-5px);
        }

        .card {
            background: none;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            margin-bottom: 0;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--emerald);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        .btn-primary:hover {
            background: var(--emerald-light);
            transform: scale(1.02);
        }

        .btn-accent {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-accent:hover {
            background: var(--gold);
            color: var(--emerald-black);
            box-shadow: 0 4px 14px 0 rgba(212, 175, 55, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
            color: white;
        }

        /* Modal Redesign */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9) !important;
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(2, 44, 34, 0.98), rgba(0, 0, 0, 0.98)) !important;
            border: 1px solid var(--gold);
            border-radius: 2rem;
            padding: 3.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            color: white;
            max-width: 550px;
            width: 90%;
            position: relative;
        }

        /* Result Overlays */
        #result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .overlay-success {
            border-top: 10px solid var(--emerald);
        }

        .overlay-duplicate {
            border-top: 10px solid var(--gold);
        }

        .overlay-error {
            border-top: 10px solid var(--danger);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                border-color: var(--success);
            }

            50% {
                transform: scale(1.05);
                border-color: var(--accent);
            }

            100% {
                transform: scale(1);
                border-color: var(--success);
            }
        }

        .scanner-frame {
            border: 4px solid var(--success);
            border-radius: 1rem;
            overflow: hidden;
            animation: pulse 2s infinite;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="nav-brand" data-i18n="الجمعية العامة 2026">الجمعية العامة 2026</a>
        <div class="nav-links">
            <a href="/" data-i18n="الرئيسية">🏠 الرئيسية</a>
            <a href="/scanner" data-i18n="الماسح">📸 الماسح</a>
            <a href="/dashboard" data-i18n="لوحة العرض">📊 لوحة العرض</a>
            <a href="/admin" data-i18n="الإدارة">⚙️ الإدارة</a>
            <select id="global-lang-select" onchange="switchAdminLang(this.value)" style="background: rgba(212,175,55,0.1); color: var(--gold); border: 1px solid var(--glass-border); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; outline: none;">
                <option value="ar">AR</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="es">ES</option>
            </select>
            <a href="/logout" class="btn-logout" data-i18n="خروج">🔑 خروج</a>
        </div>
    </nav>
    <script src="/static/js/app_i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('global-lang-select');
            if(select) {
                const lang = localStorage.getItem('diwan_admin_lang') || 'ar';
                select.value = lang;
                // applyTranslations(lang); // app_i18n.js handles this on load if initialized
            }
        });
    </script>

    <div class="container">
        {% block content %}{% endblock %}
    </div>



    {% block scripts %}{% endblock %}
</body>

</html>
