<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | Diwan Event</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --primary: #D4AF37; --secondary: #022C22; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            background: linear-gradient(135deg, var(--secondary) 0%, #064e3b 100%); 
            color: white; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }
        .container {
            text-align: center; padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(212,175,55,0.2);
            max-width: 500px; width: 90%;
        }
        .error-code { 
            font-size: 8rem; font-weight: 900; 
            color: var(--primary); line-height: 1;
            text-shadow: 0 4px 20px rgba(212,175,55,0.3);
        }
        .error-icon { font-size: 4rem; color: var(--primary); margin: 1rem 0; opacity: 0.7; }
        h2 { font-size: 1.5rem; margin: 1rem 0; }
        p { opacity: 0.7; margin-bottom: 2rem; line-height: 1.8; }
        .btn {
            display: inline-block; background: var(--primary); color: white;
            padding: 0.8rem 2rem; text-decoration: none; border-radius: 8px;
            font-weight: bold; transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(212,175,55,0.3); }
        .logo { color: var(--primary); font-weight: 900; font-size: 1.2rem; margin-top: 2rem; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="fas fa-compass"></i></div>
        <h2>الصفحة غير موجودة</h2>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.<br>تحقق من الرابط أو عد إلى الصفحة الرئيسية.</p>
        <a href="/" class="btn"><i class="fas fa-home"></i> العودة للرئيسية</a>
        <div class="logo">Diwan Event</div>
    </div>
</body>
</html>
