<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان | تسجيل منظم جديد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --emerald-deep: #022C22;
            --emerald-mid: #064E3B;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: radial-gradient(circle at top right, #065F46, #022C22, #000);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .brand {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 2rem;
        }

        .input-group {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            background: linear-gradient(135deg, var(--gold) 0%, #B8860B 100%);
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .error {
            color: #ff4e4e;
            background: rgba(255, 78, 78, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="position: absolute; top: 1rem; left: 1rem;">
            <select id="admin-lang-select" onchange="switchAdminLang(this.value)" style="padding: 5px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #fff; border-radius: 5px; cursor: pointer;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
            </select>
        </div>
        <div class="brand">Diwan</div>
        <h2 style="margin-bottom: 2rem;" data-i18n="إنشاء حساب منظم">إنشاء حساب منظم</h2>
        
        <div id="error-msg" class="error" data-i18n="خطأ في البيانات">خطأ في البيانات</div>
        <div id="success-msg" class="success" data-i18n="تم إنشاء الحساب بنجاح!">تم إنشاء الحساب بنجاح!</div>

        <form id="register-form">
            <div class="input-group">
                <label data-i18n="الاسم الكامل">الاسم الكامل</label>
                <input type="text" id="full_name" required>
            </div>
            <div class="input-group">
                <label data-i18n="اسم المستخدم">اسم المستخدم</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label data-i18n="كلمة المرور">كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            <div class="input-group">
                <label data-i18n="الصلاحية">الصلاحية</label>
                <select id="role">
                    <option value="admin" data-i18n="منظم (Admin)">منظم (Admin)</option>
                    <option value="scanner" data-i18n="ماسح ضوئي (Scanner)">ماسح ضوئي (Scanner)</option>
                    <option value="viewer" data-i18n="مشاهد (Viewer)">مشاهد (Viewer)</option>
                </select>
            </div>
            <button type="submit" class="btn" data-i18n="إنشاء الحساب">إنشاء الحساب</button>
        </form>

        <p style="margin-top: 2rem; opacity: 0.6;">
            <a href="/admin" style="color: #fff; text-decoration: none;" data-i18n="العودة للوحة التحكم">العودة للوحة التحكم</a>
        </p>
    </div>

    <script src="/static/js/app_i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('admin-lang-select');
            if(select) select.value = localStorage.getItem('diwan_admin_lang') || 'ar';
        });
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const data = {
                full_name: document.getElementById('full_name').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch('/api/admin/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok) {
                    successMsg.style.display = 'block';
                    document.getElementById('register-form').reset();
                } else {
                    errorMsg.innerText = result.error || 'فشل التسجيل';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'خطأ في الاتصال بالخادم';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
