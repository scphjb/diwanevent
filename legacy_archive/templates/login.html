<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | ديوان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --emerald-deep: #022C22;
            --emerald-light: #065F46;
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --white: #FFFFFF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: radial-gradient(circle at center, var(--emerald-light) 0%, #000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .login-card {
            background: rgba(2, 44, 34, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 4rem 3rem;
            border-radius: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }
        .login-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--gold) 0%, transparent 50%, var(--gold) 100%);
            border-radius: 3rem; z-index: -1; opacity: 0.3;
        }
        .logo {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(212,175,55,0.4);
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 2rem;
            position: relative;
        }
        input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.2rem;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            transition: 0.4s;
        }
        input:focus {
            border-color: var(--gold);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .btn {
            background: linear-gradient(135deg, var(--gold) 0%, #B8860B 100%);
            color: #000;
            border: none;
            padding: 1.2rem;
            width: 100%;
            border-radius: 1.2rem;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
        .error-msg {
            color: #ff4e4e;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            display: none;
            background: rgba(255, 78, 78, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        .footer-logo {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.3;
        }

        /* --- Responsive Mobile --- */
        @media (max-width: 768px) {
            .login-card { padding: 3rem 2rem; border-radius: 2rem; max-width: 95%; }
            .logo { font-size: 2rem; }
            .subtitle { font-size: 0.8rem; margin-bottom: 2rem; }
            input { padding: 1rem; font-size: 1rem; border-radius: 0.8rem; }
            .btn { padding: 1rem; font-size: 1rem; border-radius: 0.8rem; }
        }

        @media (max-width: 400px) {
            .login-card { padding: 2.5rem 1.5rem; }
            .logo { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div id="login-logo" class="logo"><i class="fas fa-crown"></i> <span id="login-app-name">ديوان</span></div>
        <div id="login-subtitle" class="subtitle">منصة تسيير الفعاليات</div>
        
        <div style="margin-bottom: 1.5rem; text-align: center;">
            <select id="admin-lang-select" onchange="switchAdminLang(this.value)" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(212,175,55,0.3); padding: 0.5rem 1rem; border-radius: 1rem; outline: none; cursor: pointer; font-family: inherit;">
                <option value="ar" style="color: black;">العربية</option>
                <option value="en" style="color: black;">English</option>
                <option value="fr" style="color: black;">Français</option>
                <option value="es" style="color: black;">Español</option>
            </select>
        </div>

        <form id="login-form">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" required autofocus>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn">دخول للمنصة <i class="fas fa-sign-in-alt"></i></button>
            <div id="error" class="error-msg"><i class="fas fa-exclamation-circle"></i> بيانات الدخول غير صحيحة</div>
        </form>

        <div class="footer-logo">DIWAN DIGITAL SYSTEMS &copy; 2026</div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            
            if (res.ok) {
                window.location.href = '/admin';
            } else {
                document.getElementById('error').style.display = 'block';
                btn.innerHTML = 'دخول للمنصة <i class="fas fa-sign-in-alt"></i>';
                document.getElementById('password').value = '';
            }
        });

        // Load dynamic branding
        fetch('/api/stats').then(r => r.json()).then(data => {
            const s = data.stats;
            if (s) {
                document.getElementById('login-app-name').innerText = 'ديوان لتسيير الفعاليات';
                document.getElementById('login-subtitle').innerText = 'Diwan Event Manager';
                document.title = 'تسجيل الدخول | ديوان';
                // Colors are hardcoded in CSS
                if (s.logo_url) {
                    document.getElementById('login-logo').innerHTML = `<img src="${s.logo_url}" style="height:60px;filter:drop-shadow(0 0 10px rgba(212,175,55,0.3));">`;
                }
            }
        }).catch(() => {});
    </script>
    <script src="/static/js/app_i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('admin-lang-select');
            if(select) select.value = localStorage.getItem('diwan_admin_lang') || 'ar';
        });
    </script>
</body>
</html>
